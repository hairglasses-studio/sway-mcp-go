# Inherit model, reasoning, and personal preferences from ~/.codex/config.toml.
# The global launcher layer now enforces root + full-access execution; this
# repo-local template remains project-scoped for compatibility surfaces.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by surfacekit/scripts/codex-mcp-sync.sh from .mcp.json and mcp-profile-policy.json
# Read-first Sway profile for desktop inspection and discovery.
[mcp_servers.sway_desktop_review]
command = "bash"
args = ["./scripts/run-sway-mcp.sh"]
cwd = "."
enabled_tools = [
  "sway_tool_catalog",
  "sway_tool_search",
  "sway_tool_schema",
  "sway_tool_stats",
  "sway_server_health",
  "sway_list_windows",
  "sway_get_outputs",
  "sway_screenshot",
  "sway_screenshot_region",
  "sway_clipboard_read",
]

# Curated Sway desktop workspace profile with discovery and mutation tools.
[mcp_servers.sway_desktop_workspace]
command = "bash"
args = ["./scripts/run-sway-mcp.sh"]
cwd = "."
enabled_tools = [
  "sway_tool_catalog",
  "sway_tool_search",
  "sway_tool_schema",
  "sway_tool_stats",
  "sway_server_health",
  "sway_screenshot",
  "sway_screenshot_region",
  "sway_list_windows",
  "sway_focus_window",
  "sway_move_window",
  "sway_click",
  "sway_type_text",
  "sway_key",
  "sway_scroll",
  "sway_clipboard_read",
  "sway_clipboard_write",
  "sway_get_outputs",
]

# END GENERATED MCP SERVERS: codex-mcp-sync

[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
